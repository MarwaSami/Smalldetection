<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Exam Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="floating-timer">
    <div class="timer-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
    </div>
    <div class="timer-text">
      <span class="timer-label">TIME REMAINING</span>
      <span id="timer">60:00</span>
    </div>
  </div>


  <header class="header">
    <h1>Exam Started</h1>
    <p>Your session is being monitored. Do not switch tabs or windows.</p>
  </header>

  <main class="exam-container">
    <div class="iframe-wrapper">
      <iframe
        src="https://forms.gle/r4X9TH3LYLsKw2Ra6"
        height="600" title="Exam Form">
      </iframe>
    </div>

    <div class="stats-bar">
      <div id="status-indicator">
        <span class="dot"></span>
        Monitoring Active
      </div>
      <div class="violation-badge">
        Violations: <span id="violation-count">0</span>
      </div>
    </div>
  </main>

  <section class="log-container">
    <h3>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
        <polyline points="10 9 9 9 8 9"></polyline>
      </svg>
      Activity Log
    </h3>
    <ul id="log-list" class="log-list">
      <!-- Logs will appear here -->
      <li class="log-item">
        <span class="log-message">Monitoring started successfully</span>
        <span class="log-time">Initial Session</span>
      </li>
    </ul>
  </section>

  <!-- Professional Modal -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-icon">⚠️</div>
      <h2 class="modal-title">Warning!</h2>
      <p class="modal-body" id="modal-body">
        You switched tabs during the exam. This action has been recorded.
      </p>
      <button class="modal-btn" onclick="closeModal()">I Understand</button>
    </div>
  </div>

  <audio id="alarm" src="alarm.mp3" preload="auto"></audio>

  <script src="script.js"></script>
</body>

</html>
